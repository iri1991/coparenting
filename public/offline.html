<!doctype html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>HomeSplit - Offline</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #fafaf9;
        color: #292524;
      }
      .card {
        max-width: 28rem;
        margin: 1rem;
        border-radius: 1rem;
        border: 1px solid #e7e5e4;
        background: #fff;
        padding: 1rem 1.25rem;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.05rem;
      }
      p {
        margin: 0.3rem 0;
        line-height: 1.45;
        color: #57534e;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Ești offline</h1>
      <p>Aplicația este disponibilă offline în modul PWA.</p>
      <p>Poți vedea ultimele date salvate. Când revine conexiunea, sincronizarea se face automat.</p>
    </div>
  </body>
  </html>
